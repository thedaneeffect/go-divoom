[tools]
go = "1.24"
bun = "latest"

[tasks.test]
run = "go test ./..."

[tasks.test-web]
run = "cd web && bun install && bun run test"

[tasks.check]
run = ["go vet ./...", "go test ./...", "mise run test-web"]

[tasks.build]
# webdist is generated, but .gitkeep inside it is tracked (go:embed needs the
# directory to exist for plain `go build`), so refill the directory in place
# rather than replacing it — a build must never delete a checked-in file.
run = [
  "cd web && bun install && bun run build",
  "find cmd/divoom/webdist -mindepth 1 ! -name .gitkeep -delete",
  "cp -R web/dist/. cmd/divoom/webdist/",
  "go build -o bin/divoom ./cmd/divoom",
]

[tasks.dev]
run = "go run ./cmd/divoom serve"
